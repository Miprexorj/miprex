<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM BY MIPREX</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.4);
            --purple-neon: #bc13fe;
            --purple-glow: rgba(188, 19, 254, 0.5);
            --dark: #020202;
            --card-bg: rgba(10, 10, 10, 0.9);
            --error: #ff2a2a;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fira Code', monospace; }
        body { background: var(--dark); color: white; overflow: hidden; height: 100vh; }

        /* --- ARKA PLAN EFEKTLERİ --- */
        #video-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.25); transition: 1s; }
        .overlay-grid { position: fixed; inset: 0; z-index: -1; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03)); background-size: 100% 3px, 2px 100%; pointer-events: none; }
        .vignette { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 100%); }

        /* --- ANA EKRAN --- */
        #main-wrapper { display: flex; align-items: center; justify-content: center; height: 100vh; transition: 0.5s; }
        .auth-container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }

        .brand-logo { font-size: 2.5rem; font-weight: 700; letter-spacing: 12px; color: #fff; text-shadow: 0 0 15px var(--neon-glow); margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 15px; border: 1px solid var(--neon); color: var(--neon); font-size: 0.6rem; border-radius: 3px; letter-spacing: 2px; margin-bottom: 20px; box-shadow: 0 0 10px var(--neon-glow); }

        .system-stats {
            display: flex; justify-content: space-between; margin-bottom: 20px; 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { text-align: left; }
        .stat-label { font-size: 0.5rem; color: #666; display: block; }
        .stat-value { font-size: 0.75rem; color: var(--neon); font-weight: bold; }

        .auth-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-top: 3px solid var(--neon); padding: 40px 30px; border-radius: 4px; backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        
        #key-input { width: 100%; background: rgba(0,0,0,0.7); border: 1px solid #333; padding: 18px; color: var(--neon); font-size: 1rem; outline: none; transition: 0.3s; text-align: center; border-radius: 4px; margin-bottom: 20px; }
        #key-input:focus { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }

        .btn-access { width: 100%; padding: 18px; background: transparent; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.4s; letter-spacing: 4px; }
        .btn-access:hover { border-color: var(--neon); color: var(--neon); background: rgba(0, 242, 255, 0.05); text-shadow: 0 0 10px var(--neon); }

        /* --- PANEL AYARLARI --- */
        #admin-panel {
            display: none; width: 100%; height: 100vh; overflow-y: auto;
            background: #000; padding: 20px; position: relative;
            animation: fadeIn 1s ease;
        }

        .kratox-header { border-bottom: 2px solid var(--purple-neon); padding: 10px; display: flex; justify-content: space-between; align-items: center; color: var(--purple-neon); box-shadow: 0 0 15px var(--purple-glow); }
        
        .scrolling-text { background: rgba(188, 19, 254, 0.1); border: 1px solid var(--purple-neon); margin: 20px 0; padding: 10px; color: #FF0000; overflow: hidden; white-space: nowrap; }
        .marquee { display: inline-block; animation: marquee 15s linear infinite; font-weight: bold; }

        .image-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 30px 0; }
        .mask-img { width: 280px; border: 2px solid var(--purple-neon); border-radius: 10px; box-shadow: 0 0 25px var(--purple-glow); transition: 0.3s; }

        .kratox-footer { border: 1px solid var(--purple-neon); padding: 15px; text-align: center; color: var(--purple-neon); font-size: 0.8rem; letter-spacing: 4px; font-weight: bold; }

        /* --- ANİMASYONLAR --- */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.3s ease-in-out 3; border-color: var(--error) !important; }
    </style>
</head>
<body>

    <video id="video-bg" loop playsinline muted autoplay>
        <source src="baba.mp4" type="video/mp4">
    </video>
    <div class="overlay-grid"></div>
    <div class="vignette"></div>

    <div id="main-wrapper">
        <div class="auth-container" id="auth-box">
            <h1 class="brand-logo">MIPREX</h1>
            <div class="status-badge">SİTEMİZ SON HIZIYLA ÇALIŞIYOR</div>

            <div class="system-stats">
                <div class="stat-item">
                    <span class="stat-label">CPU LOAD</span>
                    <span class="stat-value" id="cpu-val">24%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">MEMORY</span>
                    <span class="stat-value">1.4GB / 64GB</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Sistem</span>
                    <span class="stat-value" style="color: var(--success)">Aktif</span>
                </div>
            </div>

            <div class="auth-card">
                <input type="password" id="key-input" placeholder="ŞİFRE: miprex" autocomplete="off">
                <button class="btn-access" onclick="verify()">GİRİŞ YAP</button>
                <div id="error-msg" style="display:none; color: var(--error); margin-top:15px; font-size:0.7rem;">ŞİFRE YANLIŞ</div>
                <a href="https://t.me/212771300724" target="_blank" style="display:block; margin-top:20px; color:#444; font-size:0.6rem; text-decoration:none;">> TELEGRAM HESABIMA GÖZ AT</a>
            </div>
        </div>

        <div id="admin-panel">
            <div class="kratox-header">
                <span>MİPREX | S4NAL</span>
                <span style="font-size: 0.7rem;">IP: 89.144.10.193</span>
            </div>

            <div class="scrolling-text">
                <div class="marquee">KORKUYORSAN YAPMA, YAPIYORSAN KORKMA. KARANLIKLA YAŞA.
                MİPREX SANAL'IN EN İYİSİ
                </div>
            </div>

            <div class="image-container">
                <img src="foto.jpg" alt="KRATOX_1" class="mask-img" onerror="this.src='https://via.placeholder.com/280x350/000000/bc13fe?text=FOTO+1'">
                <img src="foto.jpg" alt="KRATOX_2" class="mask-img" onerror="this.src='https://via.placeholder.com/280x350/000000/bc13fe?text=FOTO+2'">
            </div>

            <div class="kratox-footer">
                MİPREX | DENK OLAMAZSINIZ ;)
            </div>

            <center>
                <button onclick="location.reload()" style="margin-top:40px; background:transparent; border:1px solid var(--purple-neon); color:var(--purple-neon); padding:12px 25px; cursor:pointer; border-radius: 5px; font-size: 0.7rem; letter-spacing: 2px;">SİSTEMDEN ÇIKIŞ</button>
            </center>
        </div>
    </div>

    <script>
        // İstatistik simülasyonu
        setInterval(() => {
            const val = Math.floor(Math.random() * (35 - 15) + 15);
            const cpu = document.getElementById('cpu-val');
            if(cpu) cpu.innerText = val + "%";
        }, 2000);

        function verify() {
            const input = document.getElementById('key-input');
            const error = document.getElementById('error-msg');
            const authBox = document.getElementById('auth-box');
            const adminPanel = document.getElementById('admin-panel');
            if(input.value.toLowerCase() === "miprex") {
                authBox.style.display = "none";
                adminPanel.style.display = "block";
                document.getElementById('video-bg').style.filter = "brightness(0.05) blur(10px)";
                document.body.style.overflowY = "auto";
            } else {
                error.style.display = "block";
                input.classList.add('error-shake');
                input.value = "";
                setTimeout(() => input.classList.remove('error-shake'), 500);
            }
        }

        document.getElementById('key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verify();
        });

        document.body.addEventListener('click', () => {
            document.getElementById('video-bg').muted = false;
        }, { once: true });
    </script>
</body>
</html>
